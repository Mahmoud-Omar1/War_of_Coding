<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>War of Coding</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/dracula.min.css">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm/css/xterm.css">

  <link rel="icon" href="assets/icon.jpg" type="image/jpg">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/clike/clike.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/python/python.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm/lib/xterm.min.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <link rel="stylesheet" href="design.css">
  <script src="main.js" defer></script>
</head>

<body>
  <div class="container-fluid p-4">
    <div class="p-3 rounded-4" style="background:rgba(20,26,45,0.75); border:1px solid #333;">

      <div class="d-flex justify-content-between align-items-center mb-3">
        <div class="header-brand">
          <img src="assets/05.png" alt="War of Coding" class="header-logo-icon">
          <div class="header-text">War of Coding</div>
        </div>

        <div class="d-flex gap-2">
          <select id="language" class="form-select" style="width:150px">
            <option value="54">C++</option>
            <option value="62">Java</option>
            <option value="71">Python</option>
          </select>

          <select id="difficulty" class="form-select" style="width:150px">
            <option value="Easy">Easy</option>
            <option value="Medium">Medium</option>
            <option value="Hard">Hard</option>
          </select>

          <button class="btn btn-primary" onclick="generateProblem()">Generate</button>
          <button class="btn btn-success" onclick="runCode()">Run</button>
          <button class="btn btn-warning" onclick="submitSolution()">Submit</button>
        </div>
      </div>

      <div id="problemBox" class="p-3 mb-3 rounded-3"
        style="background:#111; border:1px solid #333; white-space:pre-wrap;">
        Problem will appear here...
      </div>

      <div class="row g-3">
        <div class="col-lg-8">
          <textarea id="editor"></textarea>
        </div>

        <div class="col-lg-4">
          <label class="mb-2">Terminal 💻</label>
          <div id="terminal"></div>
        </div>
      </div>

    </div>
  </div>

  <div class="modal fade" id="verdictModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content glass"
        style="background: rgba(20, 20, 40, 0.98); border: 2px solid rgba(138,43,226,0.6);">
        <div class="modal-header border-0 pb-2">
          <h5 class="modal-title text-white">Result</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body text-center py-4">
          <div id="verdictIcon" class="mb-4" style="font-size: 5rem;"></div>
          <h3 id="verdictText" class="fw-bold mb-2"></h3>
          <small id="verdictSub" class="text-white-50"></small>
        </div>
        <div class="modal-footer border-0">
          <button type="button" class="btn btn-primary px-5 py-2" data-bs-dismiss="modal">Ok</button>
        </div>
      </div>
    </div>
  </div>
</body>

</html>
